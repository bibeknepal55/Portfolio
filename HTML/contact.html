<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Bibek Nepal</title>
  <link rel="stylesheet" href="../CSS/style.css">
  <script>
    const t = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', t);
  </script>
</head>
<body>

  <div class="page">
    <div class="section">
      <p class="section-label">Say Hello</p>
      <h2 class="section-title">Get in Touch</h2>
      <p class="section-sub">Have a project or opportunity? I'd love to hear from you.</p>

      <div class="contact-grid">

        <div class="contact-info">
          <div class="card">
            <div class="card-icon">📧</div>
            <h3>Email</h3>
            <p><a href="mailto:bibeknepal2060@gmail.com">bibeknepal2060@gmail.com</a></p>
          </div>
          <div class="card">
            <div class="card-icon">💼</div>
            <h3>LinkedIn</h3>
            <p><a href="https://linkedin.com/in/bibeknepal55" target="_blank">linkedin.com/in/bibeknepal55</a></p>
          </div>
          <div class="card">
            <div class="card-icon">🐙</div>
            <h3>GitHub</h3>
            <p><a href="https://github.com/bibeknepal55" target="_blank">github.com/bibeknepal55</a></p>
          </div>
          <div class="card">
            <div class="card-icon">📍</div>
            <h3>Location</h3>
            <p>Kathmandu, Nepal</p>
          </div>
        </div>

        <div class="form-card">
          <h3 style="font-size:1.1rem; font-weight:800; margin-bottom:1.5rem; letter-spacing:-0.3px;">Send a Message</h3>
          <form>
            <div class="form-group">
              <label>Name</label>
              <input type="text" placeholder="Your name">
            </div>
            <div class="form-group">
              <label>Email</label>
              <input type="email" placeholder="your@email.com">
            </div>
            <div class="form-group">
              <label>Subject</label>
              <input type="text" placeholder="What's this about?">
            </div>
            <div class="form-group">
              <label>Message</label>
              <textarea placeholder="Tell me about your project or opportunity..."></textarea>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; padding:0.85rem; font-size:0.9rem;">Send Message</button>
          </form>
        </div>

      </div>
    </div>
  </div>

  <script src="../JS/components.js"></script>
</body>
</html>
